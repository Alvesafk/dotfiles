# ──────────────────────────────
#   FONT
# ──────────────────────────────

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
font_size 12

adjust_line_height 4
adjust_column_width 1
disable_ligatures never

# ──────────────────────────────
#   WINDOW BEHAVIOR
# ──────────────────────────────

window_padding_width 1 
enable_audio_bell no
remember_window_size no
placement_strategy center
hide_window_decorations titlebar-only

# ──────────────────────────────
#   PERFORMANCE
# ──────────────────────────────

repaint_delay 10
input_delay   1
sync_to_monitor yes

# ──────────────────────────────
#   SCROLLBACK
# ──────────────────────────────

scrollback_lines 5000
scrollback_pager_history_size 64

# ──────────────────────────────
#   KEYBINDINGS
# ──────────────────────────────

map ctrl+shift+enter new_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+w     close_tab

# ──────────────────────────────
#   COLORS — Gruvbox Palette Dark 
# ──────────────────────────────

foreground            #ebdbb2
background            #141414
background_opacity    0.9
selection_foreground  #ebdbb2
selection_background  #504945
cursor                #ebdbb2
cursor_text_color     #282828
url_color             #83a598
active_border_color   #504945
inactive_border_color #3c3836

# ───────── ANSI

# black / base
color0   #282828
color8   #928374

# red / danger
color1   #cc241d
color9   #fb4934

# green
color2   #98971a
color10  #b8bb26

# yellow / warning
color3   #d79921
color11  #fabd2f

# blue / highlight
color4   #458588
color12  #83a598

# magenta / pink
color5   #b16286
color13  #d3869b

# cyan
color6   #689d6a
color14  #8ec07c

# white / fg
color7   #a89984
color15  #ebdbb2

window_border_width 0
cursor_shape block
cursor_blink_interval 0.8
shell_integration enabled
